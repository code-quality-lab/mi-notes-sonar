name: SonarQube 代码质量扫描
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sonarscan:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取完整代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube 官方扫描（最简配置）
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
