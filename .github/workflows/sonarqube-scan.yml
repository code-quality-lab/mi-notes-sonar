name: SonarQube 代码质量扫描
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sonarscan:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取完整代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube 纯源码扫描（零Gradle依赖）
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=mi-notes-sonar
            -Dsonar.projectName="小米便签开源版"
            -Dsonar.sources=app/src/main/java
            -Dsonar.java.binaries=
            -Dsonar.exclusions=**/.gradle/**,**/build/**,**/test/**
