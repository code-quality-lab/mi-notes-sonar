name: SonarQube 代码质量扫描

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sonarscan:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 必须，用于SonarQube识别代码变更

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 配置 Gradle 缓存（大幅加速构建）
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: 赋予 Gradle 执行权限（兼容异常场景，避免报错）
        run: |
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
          fi

      - name: 编译项目（跳过测试）
        run: ./gradlew clean build -x test

      - name: 执行 SonarQube 扫描
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: ./gradlew sonar
