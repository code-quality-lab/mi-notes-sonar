name: SonarQube 代码质量扫描

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sonarscan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 必须，用于SonarQube识别代码变更

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 赋予 Gradle 执行权限
        run: chmod +x ./gradlew

      - name: 编译项目（跳过测试）
        run: ./gradlew clean build -x test

      - name: 执行 SonarQube 扫描
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: ./gradlew sonarqube \
          -Dsonar.projectKey=mi-notes-sonar \
          -Dsonar.projectName="小米便签开源版" \
          -Dsonar.sources=app/src/main/java \
          -Dsonar.exclusions="**/build/**,**/test/**,**/libs/**,**/res/**" \
          -Dsonar.java.source=8
